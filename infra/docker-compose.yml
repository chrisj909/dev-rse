version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: rse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rse_user
      POSTGRES_PASSWORD: rse_password
      POSTGRES_DB: rse_db
    volumes:
      - rse_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rse_user -d rse_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rse_api
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  rse_pgdata:
