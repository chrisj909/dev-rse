[pytest]
# RSE test configuration
asyncio_mode = strict
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Disable cache (filesystem permission issues in mounted volumes)
# Disable pytest-postgresql plugin (requires libpq not available in CI/sandbox)
addopts = -p no:cacheprovider -p no:postgresql -v
